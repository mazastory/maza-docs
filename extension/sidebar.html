<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>MAZA Control</title>
  <style>
    :root {
      --bg: #030712;
      --card: #111827;
      --primary: #6366f1;
      --primary-glow: rgba(99, 102, 241, 0.3);
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
      --text: #f9fafb;
      --muted: #9ca3af;
      --border: #1f2937;
    }
    
    * { box-sizing: border-box; }
    
    body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex; flex-direction: column;
      letter-spacing: -0.02em;
    }
    
    .header {
      padding: 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(17, 24, 39, 0.8);
      backdrop-blur: 8px;
    }
    .header h1 { 
      margin: 0; font-size: 14px; font-weight: 900; 
      color: var(--text); text-transform: uppercase; letter-spacing: 0.1em;
      font-style: italic;
    }
    .header .version { font-size: 10px; color: var(--muted); font-weight: 800; }
    
    .status-bar {
      padding: 10px 20px; background: rgba(99, 102, 241, 0.05);
      font-size: 11px; color: var(--primary); display: flex; align-items: center; gap: 8px;
      font-weight: 800; border-bottom: 1px solid var(--border);
    }
    .pulse {
      width: 6px; height: 6px; background: var(--primary); border-radius: 50%;
      box-shadow: 0 0 10px var(--primary);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0% { opacity: 0.4; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.1); } 100% { opacity: 0.4; transform: scale(0.8); } }

    .content { flex: 1; overflow-y: auto; padding: 20px; scrollbar-width: none; }
    .content::-webkit-scrollbar { display: none; }
    
    .section-title { 
      font-size: 9px; font-weight: 900; color: var(--muted); 
      margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.15em;
      display: flex; align-items: center; gap: 6px;
    }
    
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 16px; margin-bottom: 20px;
      transition: all 0.3s ease;
    }
    .card:hover { border-color: #374151; }
    
    /* Connection Info Styles */
    .info-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .info-label { font-size: 11px; color: var(--muted); font-weight: 600; }
    .info-value { font-size: 11px; color: var(--text); font-weight: 700; font-family: monospace; }
    
    .badge {
      padding: 3px 8px; border-radius: 6px; font-size: 9px; font-weight: 900;
      text-transform: uppercase;
    }
    .badge-success { background: rgba(16, 185, 129, 0.1); color: var(--success); }
    .badge-error { background: rgba(239, 68, 68, 0.1); color: var(--error); }
    .badge-warning { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
    
    /* Log Styles */
    .log-container {
      font-family: "JetBrains Mono", "SF Mono", monospace; font-size: 10px;
      color: #9ca3af; line-height: 1.5;
    }
    .log-item { border-left: 2px solid var(--border); padding-left: 10px; margin-bottom: 6px; }
    .log-time { color: var(--primary); font-weight: 700; margin-right: 6px; }

    .footer {
      padding: 20px; border-top: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 10px;
      background: var(--bg);
    }
    .btn-group { display: flex; gap: 8px; }
    .btn {
      flex: 1; background: var(--card); color: var(--text); border: 1px solid var(--border);
      padding: 12px; border-radius: 12px; font-size: 12px; font-weight: 800; cursor: pointer;
      transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .btn:hover { background: #1f2937; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-primary { 
      background: var(--primary); border-color: var(--primary); color: white;
      box-shadow: 0 4px 12px var(--primary-glow);
    }
    .btn-primary:hover { background: #4f46e5; box-shadow: 0 6px 16px var(--primary-glow); }
    .btn-outline { background: transparent; border-color: var(--border); color: var(--muted); }
    .btn-outline:hover { border-color: var(--primary); color: var(--text); }
  </style>
</head>
<body>
  <div class="header">
    <h1>Maza <span style="color: var(--primary)">Control</span></h1>
    <div class="version">V1.1.0 PRO</div>
  </div>

  <div class="status-bar">
    <div class="pulse"></div>
    <span id="engine-status">OS Engine Polling...</span>
  </div>

  <div class="content">
    <!-- IDENTITY STATUS -->
    <div class="section-title">Identity & Auth</div>
    <div class="card" id="identity-card">
      <div class="info-row">
        <span class="info-label">Account</span>
        <span class="info-value" id="user-email">Guest User</span>
      </div>
      <div class="info-row">
        <span class="info-label">Auth Token</span>
        <span id="token-status" class="badge badge-error">Disconnected</span>
      </div>
    </div>

    <!-- ACTIVE TASK (Live Status) -->
    <div class="section-title">Live Status</div>
    <div class="card" style="border-left: 4px solid var(--primary);">
      <div id="active-task" style="font-size: 13px; font-weight: 800; color: var(--text);">Standby — Waiting for Task</div>
    </div>

    <!-- PENDING TASK -->
    <div class="card" id="pending-task-card" style="display: none; border-color: var(--primary); background: rgba(99, 102, 241, 0.05);">
      <div class="section-title" style="color: var(--primary); margin-bottom: 8px;">Pending Draft Detected</div>
      <div id="pending-task-title" style="font-size: 13px; font-weight: 800; margin-bottom: 12px; color: var(--text);">개인정보 처리방침</div>
      <button class="btn btn-primary" id="manual-inject-btn" style="width: 100%; padding: 8px; font-size: 11px;">지금 에디터에 주입하기</button>
    </div>

    <!-- LOGS (Expanded) -->
    <div class="section-title" style="display: flex; justify-content: space-between; margin-top: 20px;">
      <span>Event Logs</span>
      <span style="font-size: 8px; color: var(--primary); cursor: pointer; text-transform: none; letter-spacing: 0;" onclick="document.getElementById('log-list').innerHTML=''">Clear Console</span>
    </div>
    <div class="card" style="flex: 1; min-height: 250px; display: flex; flex-direction: column; overflow: hidden; padding: 12px;">
      <div class="log-container" id="log-list" style="flex: 1; overflow-y: auto;">
        <div class="log-item"><span class="log-time">SYSTEM</span> MAZA Bridge Ready.</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="btn-group">
      <button class="btn btn-outline" id="start-manual">Force Poll</button>
      <button class="btn btn-outline" id="open-manual">MAZA Manual</button>
    </div>
    <button class="btn btn-primary" id="open-studio" style="margin-top: 5px;">Go to Studio</button>
  </div>

  <script type="module" src="sidebar.js"></script>
</body>
</html>
